<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Feed Finder</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
        width: 320px;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      header svg {
        flex-shrink: 0;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      #status {
        font-size: 13px;
        color: #aaa;
        line-height: 1.4;
      }

      #feed-container {
        display: none;
      }

      #url-display {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 9px 12px;
        font-size: 11.5px;
        font-family: "SF Mono", "Fira Code", monospace;
        color: #ccc;
        word-break: break-all;
        line-height: 1.5;
        margin-bottom: 10px;
        user-select: all;
      }

      #copy-btn {
        width: 100%;
        padding: 8px;
        background: #f97316;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      #copy-btn:hover {
        background: #ea6c0a;
      }

      #copy-btn.copied {
        background: #1a7a3a;
      }
    </style>
  </head>
  <body>
    <header>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="20" height="20" rx="4" fill="#f97316"/>
        <circle cx="5" cy="15" r="2" fill="white"/>
        <path d="M4 10.5C7.59 10.5 9.5 12.41 9.5 16H11.5C11.5 11.31 8.69 8.5 4 8.5V10.5Z" fill="white"/>
        <path d="M4 6C9.79 6 14 10.21 14 16H16C16 9.1 10.9 4 4 4V6Z" fill="white"/>
      </svg>
      <h1>RSS Feed Finder</h1>
    </header>

    <div id="status">Loading...</div>

    <div id="feed-container">
      <div id="url-display"></div>
      <button id="copy-btn">Copy URL</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
